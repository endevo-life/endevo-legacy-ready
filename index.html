<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.png" type="image/png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Google tag (gtag.js) with Consent Mode v2 -->
    <script
      async
      src="https://www.googletagmanager.com/gtag/js?id=G-ERD7MYD0GX"
    ></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }

      // Set default consent to denied - will be updated based on user choice
      gtag("consent", "default", {
        analytics_storage: "denied",
        ad_storage: "denied",
        ad_user_data: "denied",
        ad_personalization: "denied",
        functionality_storage: "denied",
        personalization_storage: "denied",
        security_storage: "granted",
      });

      gtag("js", new Date());
      gtag("config", "G-ERD7MYD0GX", {
        anonymize_ip: true,
        cookie_flags: "SameSite=None;Secure",
      });
    </script>

    <!--
      Page <title>, meta description, canonical, Open Graph and Twitter tags are
      injected per-route by the SEO component (react-helmet-async) and baked into
      each page at prerender time. They are intentionally NOT duplicated here to
      avoid "more than one canonical/meta description tag" SEO errors.
    -->
    <title>ENDevo — Legacy Readiness & Digital Preparedness</title>
    <meta name="author" content="ENDevo" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />

    <!-- DNS prefetch / preconnect for external resources -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preconnect"
      href="https://assets.cdn.filesafe.space"
      crossorigin
    />
    <link rel="dns-prefetch" href="//storage.googleapis.com" />
    <link rel="dns-prefetch" href="//widgets.leadconnectorhq.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Dancing+Script:wght@400;700&display=swap"
      rel="stylesheet"
    />

    <!-- Bing Webmaster Tools verification -->
    <meta name="msvalidate.01" content="8AD459227FD89E07BE963186C5BBBA20" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- GoHighLevel Chat Widget (Hidden UI, API only) -->
    <script
      src="https://widgets.leadconnectorhq.com/loader.js"
      data-resources-url="https://widgets.leadconnectorhq.com/chat-widget/loader.js"
      data-widget-id="696728e12fb2fb1f6d6ae215"
    ></script>
  </body>
</html>
